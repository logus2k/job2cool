# job2cool — HR assistant. Joins noted's shared external network to reuse
# agent_server / noted-rag / noted-graph / noted-tools / noted in place.
# COPY-ONLY: nothing in noted or cv is modified. See documents/project_plan.md.
services:
  job2cool-backend:
    build: ./backend
    container_name: job2cool-backend
    ports:
      - "4920:4920"
    environment:
      AGENT_SERVER_URL: "http://agent_server:7701"
      # KB services now go through kb-service (the standalone KB gateway), not
      # noted directly. kb-service forwards /rag and /graph to the engines.
      NOTED_BACKEND_URL: "http://kb-service:8080"
      NOTED_RAG_URL: "http://kb-service:8080/rag"
      NOTED_GRAPH_URL: "http://kb-service:8080/graph"
      NOTED_TOOLS_URL: "http://noted-tools:7702"
      # Shared MCP tool/skill host (Skills/Tools admin UI). The backend holds the
      # admin token so the browser never sees it. Keep token in sync with mcp/.env.
      MCP_SERVICE_URL: "http://mcp-service:8080"
      MCP_ADMIN_TOKEN: "${MCP_ADMIN_TOKEN:-mcp-admin-7f3c9a2e5b14d806}"
      MCP_APP: "job2cool"
      JOB2COOL_GEMMA_MODEL: "gemma-4"
      JOB2COOL_DPO_MODEL: "ma2-360m-dpo-b01"
      JOB2COOL_DOMAINS: "jobs_onboard_devops,ai_and_jobs,prod_mng,sw_arch"
    volumes:
      # Live-mount the frontend so the shell can be iterated without rebuilds.
      - ./frontend:/app/frontend:ro
      # Persistent per-user chat threads (survive container restarts).
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - noted-network
      - logus2k_network

networks:
  # Created by the noted stack; job2cool joins it to reach the shared services.
  noted-network:
    external: true
  # Created by the agent stack; hosts stt_server / tts_server / avatar_server.
  logus2k_network:
    external: true
