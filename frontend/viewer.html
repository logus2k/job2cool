<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noted viewer</title>

    <!-- Highlight.js theme -->
    <link rel="stylesheet" href="static/vendor/github.min.css">
    <!-- KaTeX styles -->
    <link rel="stylesheet" href="static/vendor/katex.min.css">
    <!-- Notebook viewer styles -->
    <link rel="stylesheet" href="static/notebook-viewer.css">

    <style>
        body {
            margin: 0;
            padding: 12px 16px;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            box-sizing: border-box;
        }
        #viewer-wrapper {
            height: 100%;
            overflow-y: scroll;
            overscroll-behavior: contain;
            padding-right: 12px;
            max-width: fit-content;
        }
        #viewer {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 0 0 8px;
            box-shadow: rgba(9, 30, 66, 0.25) 0px 1px 1px, rgba(9, 30, 66, 0.13) 0px 0px 1px 1px;
        }
        #viewer-wrapper::-webkit-scrollbar {
            width: 8px;
        }
        #viewer-wrapper::-webkit-scrollbar-track {
            background: transparent;
            margin: 6px 0;
        }
        #viewer-wrapper::-webkit-scrollbar-thumb {
            background: #6096e5ad;
            border-radius: 4px;
            cursor: pointer;
        }
        #viewer-wrapper::-webkit-scrollbar-thumb:hover,
        #viewer-wrapper::-webkit-scrollbar-thumb:active {
            background: #4a7bd0cc;
        }
    </style>
</head>
<body>
    <div id="viewer-wrapper"><div id="viewer"></div></div>

    <!-- Dependencies (order matters) -->
    <script src="static/vendor/marked.min.js"></script>
    <script src="static/vendor/highlight.min.js"></script>
    <script src="static/vendor/highlight-python.min.js"></script>
    <script src="static/vendor/highlight-powershell.min.js"></script>
    <script src="static/vendor/highlight-dockerfile.min.js"></script>
    <script src="static/vendor/katex.min.js"></script>
    <script src="static/vendor/katex-auto-render.min.js"></script>

    <!-- Notebook viewer -->
    <script src="static/notebook-viewer.js"></script>

    <script>
        // Query params:
        //   /viewer?project=ProjectName&notebook=Notebook.ipynb&theme=dark
        const params = new URLSearchParams(window.location.search);
        const project = params.get('project');
        const notebook = params.get('notebook');
        const theme = params.get('theme') || 'default';

        if (project && notebook) {
            const url = `api/projects/${encodeURIComponent(project)}/notebooks/${encodeURIComponent(notebook)}`;
            NotebookViewer.render('#viewer', url, theme);
        } else {
            document.getElementById('viewer').innerHTML =
                '<p style="padding:24px;color:#888;">Usage: <code>viewer?project=ProjectName&amp;notebook=Notebook.ipynb&amp;theme=default</code></p>';
        }
    </script>
</body>
</html>
