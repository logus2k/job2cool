    <!-- Restore wallpaper before paint to prevent flash -->
    <script>
    (function() {
        var s = localStorage.getItem('wallpaper');
        var d = s ? null : { type: 'image', name: 'natural park', url: 'wallpapers/natural_park.jpg' };
        if (!d) try {
            d = JSON.parse(s);
            var css;
            if (d.type === 'pattern') {
                var patterns = {
                    'Grid': { bc: '#d3d3d32e', bi: 'linear-gradient(rgb(107 107 107 / 14%) 1px, transparent 1px), linear-gradient(90deg, rgba(140, 160, 180, 0.35) 1px, transparent 1px)', bs: '10px 10px' },
                    'Dots': { bc: '#f0f0f0', bi: 'radial-gradient(circle, #b0b0b0 1px, transparent 1px)', bs: '20px 20px' },
                    'Diagonal Lines': { bc: '#f5f5f5', bi: 'repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.03) 10px, rgba(0,0,0,0.03) 11px)', bs: 'auto' },
                    'Blueprint': { bc: '#1a2a3a', bi: 'linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px)', bs: '100px 100px, 100px 100px, 20px 20px, 20px 20px' },
                    'Carbon': { bc: '#2c2c2c', bi: 'linear-gradient(27deg, #1a1a1a 5px, transparent 5px), linear-gradient(207deg, #1a1a1a 5px, transparent 5px), linear-gradient(27deg, #222 5px, transparent 5px), linear-gradient(207deg, #222 5px, transparent 5px), linear-gradient(90deg, #1b1b1b 10px, transparent 10px), linear-gradient(#222 25%, #1b1b1b 25%, #1b1b1b 50%, transparent 50%, transparent 75%, #242424 75%, #242424)', bs: '30px 30px' },
                    'None': { bc: 'transparent', bi: 'none', bs: 'auto' }
                };
                var p = patterns[d.name];
                if (p) css = 'background-color:' + p.bc + ';background-image:' + p.bi + ';background-size:' + p.bs;
            } else if (d.type === 'image' && d.url) {
                css = "background-color:#1a1a1a;background-image:url('" + d.url + "');background-size:cover;background-position:center";
            }
            if (css) {
                var st = document.createElement('style');
                st.textContent = 'html,body{' + css + '}';
                document.head.appendChild(st);
            }
        } catch(e) {}
    })();
    </script>
