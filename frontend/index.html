<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>job2cool — HR Assistant</title>
<link rel="stylesheet" href="static/widget/vendor/jspanel/jspanel.min.css">
<link rel="stylesheet" href="static/widget/vendor/katex/katex.min.css">
<link rel="stylesheet" href="static/widget/cv-chat.css">
<style>
  :root{ --bg:#f6f7fb; --panel:#fff; --ink:#1e2330; --muted:#6b7280;
    --primary:#ffe19b; --primary-d:#8a6a12; --primary-soft:#fff6df;
    --ok:#157347; --line:#e6e8ef; --shadow:0 1px 3px rgba(20,24,40,.06); }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font:14.5px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg)}
  header{display:flex;align-items:center;gap:.7rem;padding:.5rem 1.3rem;min-height:72px;background:var(--panel);
         border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  .logo{height:56px;width:auto;display:block;border-radius:6px}
  header b{font-size:22px;letter-spacing:-.2px}
  header .sub{color:var(--muted);font-size:12.5px}
  header .spacer{flex:1}
  .pill{font-size:11.5px;font-weight:600;padding:.2rem .55rem;border-radius:20px}
  .pill.ai{background:var(--primary-soft);color:var(--primary-d)}
  .pill.done{background:#e7f6ee;color:var(--ok)}
  .hbtn{border:1px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;padding:.5rem .9rem;
        color:var(--muted);font-size:16px;display:inline-flex;align-items:center;gap:.4rem}
  .hbtn:hover{border-color:var(--primary);color:var(--primary-d)}

  .tabbar{display:flex;gap:.2rem;padding:.4rem .6rem 0;background:var(--panel);border-bottom:1px solid var(--line);overflow:auto}
  .tab{padding:.5rem .9rem;cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;
       color:var(--muted);font-weight:600;font-size:13px;white-space:nowrap}
  .tab.active{background:var(--bg);color:var(--ink);border-color:var(--line)}
  .tab.busy::after{content:" •";color:var(--primary)}
  .docpane{padding:1.2rem}
  .docwrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);max-width:920px;margin:0 auto}
  .doctool{display:flex;align-items:center;gap:.5rem;padding:.55rem .9rem;border-bottom:1px solid var(--line);background:#fbfbfe}
  .doctool .ttl{font-weight:700;font-size:13.5px;flex:1}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:0;background:#fff;padding:.25rem .6rem;font-size:12px;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--primary);color:var(--ink)}
  .iconbtn{border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;width:28px;height:26px;
           display:inline-flex;align-items:center;justify-content:center;color:var(--muted);padding:0}
  .iconbtn:hover{color:var(--primary-d);border-color:var(--primary)}
  .iconbtn svg{width:13px;height:13px}
  .docbody{padding:1.1rem 1.4rem;min-height:50vh}
  .docbody.pending{color:var(--muted);font-style:italic}
  .docbody h1{font-size:19px;margin:.1rem 0 .8rem}
  .docbody h2{font-size:15px;margin:1.1rem 0 .4rem;color:var(--primary-d)}
  .docbody h3{font-size:13.5px;margin:.9rem 0 .3rem}
  .docbody ul{margin:.3rem 0 .3rem 1.1rem;padding:0}
  .docbody em{color:var(--muted)}
  .empty{max-width:920px;margin:3rem auto;color:var(--muted);text-align:center}

  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:9000;background:#1e2330;color:#fff;
         padding:.5rem .9rem;border-radius:8px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:.95}
  .modal-bg{position:fixed;inset:0;background:rgba(20,24,40,.35);z-index:9500;display:none;align-items:center;justify-content:center}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(20,24,40,.3);width:420px;max-width:92vw;padding:1.2rem 1.3rem}
  .modal h3{margin:0 0 .2rem;font-size:16px}
  .modal .desc{color:var(--muted);font-size:12.5px;margin-bottom:1rem}
  .modal h4{margin:0 0 .5rem;font-size:13.5px}
  .modal label{display:flex;align-items:center;gap:.55rem;padding:.45rem .55rem;border:1px solid var(--line);
               border-radius:9px;margin-bottom:.4rem;cursor:pointer;font-size:13.5px}
  .modal label:hover{border-color:var(--primary)}
  .modal label input{accent-color:var(--primary);width:16px;height:16px}
  .modal .muted{color:var(--muted);font-size:11.5px}
  .modal .foot{display:flex;justify-content:flex-end;gap:.5rem;margin-top:.6rem}
  .modal .foot button{border:0;border-radius:9px;padding:.5rem 1rem;font-weight:600;cursor:pointer}
  .modal .foot .ok{background:var(--primary);color:var(--ink)}
  .modal .foot .cancel{background:#eef0f5;color:var(--ink)}
  /* job2cool: open the Assistant from the top-bar button, not a floating launcher */
  .cvchat-launcher{display:none !important;}
  /* PDF export: print only the active document in place (no separate tab) */
  #printarea{display:none}
  @media print{
    body > *:not(#printarea){display:none !important}
    .cvchat-panel{display:none !important}
    #printarea{display:block !important;margin:0;padding:0;color:#1e2330;font:13px/1.55 system-ui,sans-serif}
    #printarea h1{font-size:21px;margin:0 0 .8rem}
    #printarea h2{font-size:16px;margin:1rem 0 .4rem}
    #printarea h3{font-size:13.5px;margin:.8rem 0 .3rem}
    #printarea ul{margin:.3rem 0 .3rem 1.1rem}
    #printarea em{color:#666}
    @page{margin:1.6cm}
  }
  /* Assistant panel width: ~1/3 of the screen on wide displays, growing to ~1/2
     on smaller ones (600px target, clamped between 33vw and 50vw). Mobile falls
     back to full width via cv-chat.css's own media query. The resizer still
     overrides this (it sets the var inline). */
  :root{ --cvchat-panel-w: clamp(33vw, 600px, 50vw); }
</style>
</head>
<body>
<header>
  <img class="logo" src="static/images/job2cool_logo_small.png" alt="job2cool" /><b>job2cool</b>
  <span class="spacer"></span>
  <button class="hbtn" id="assistantOpen" title="Open the Assistant chat">💬 Assistant</button>
  <button class="hbtn" id="gear" title="Settings">⚙ Settings</button>
</header>

<div class="tabbar" id="tabbar"></div>
<div class="docpane" id="docpane"></div>

<div class="toast" id="toast"></div>
<div id="printarea"></div>
<div class="modal-bg" id="modalbg">
  <div class="modal">
    <h3>Settings</h3>
    <div class="desc">Configure how the hiring package is generated.</div>
    <h4>Job Offer Generation</h4>
    <div class="muted" style="margin-bottom:.5rem">Select one or more sources used to produce the job offer.</div>
    <label><input type="checkbox" id="cfg-ma2" value="ma2" checked> MA2 DPO Q8 <span class="muted">— specialist offer model</span></label>
    <label><input type="checkbox" id="cfg-gemma" value="gemma" checked> Gemma 4 E4B Q4 <span class="muted">— refine &amp; compose</span></label>
    <label><input type="checkbox" id="cfg-rag" value="rag" checked> RAG <span class="muted">— ground in the knowledge base</span></label>
    <div class="foot"><button class="cancel" id="cfg-cancel">Cancel</button><button class="ok" id="cfg-save">Save</button></div>
  </div>
</div>

<script src="static/vendor_j2c/marked.min.js"></script>
<script>
const $=s=>document.querySelector(s);
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const md2html=m=>window.marked?marked.parse(m||''):esc(m);
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1600);}
const PDF_ICON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
const COPY_ICON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';

// deliverable tabs (created on demand from buffer events)
const MAIN=['Job Offer','Technical Interviews','Onboarding Plan','Cultural & Team Fit'];
const ORDER=Object.fromEntries(MAIN.map((t,i)=>[t,i]));
const doc={order:[],content:{},active:null,offerView:'gemma'};
const isPending=c=>!c||/_Generating…_|_Pending…_/.test(c);

function shownFor(title){
  if(title==='Job Offer'&&doc.offerView==='ma2'&&doc.content['Job Offer (MA2)']!=null) return 'Job Offer (MA2)';
  return title;
}
function copyMD(name){navigator.clipboard.writeText(doc.content[name]||'').then(()=>toast('Markdown copied')).catch(()=>toast('Copy failed'));}
function exportPDF(name){
  // Print the document in place (no extra tab) -> browser Save-as-PDF, like cv.
  const pa=$('#printarea');pa.innerHTML=md2html(doc.content[name]||'');
  const prev=document.title;document.title=name;            // sensible filename
  function after(){document.title=prev;pa.innerHTML='';window.removeEventListener('afterprint',after);}
  window.addEventListener('afterprint',after);
  window.print();
}

function render(){
  const tb=$('#tabbar');tb.innerHTML='';
  doc.order.forEach(title=>{const t=document.createElement('div');
    t.className='tab'+(doc.active===title?' active':'')+(isPending(doc.content[title])?' busy':'');
    t.textContent=title;t.onclick=()=>{doc.active=title;render();};tb.appendChild(t);});
  const pane=$('#docpane');
  if(!doc.active){pane.innerHTML='';return;}
  const showName=shownFor(doc.active);
  const content=doc.content[showName]||'';
  const pending=isPending(content);
  const hasMa2=doc.active==='Job Offer'&&doc.content['Job Offer (MA2)']!=null;
  const seg=hasMa2?`<span class="seg">
      <button class="${doc.offerView==='gemma'?'on':''}" data-v="gemma">Gemma</button>
      <button class="${doc.offerView==='ma2'?'on':''}" data-v="ma2">MA2</button></span>`:'';
  pane.innerHTML=`<div class="docwrap">
      <div class="doctool"><span class="ttl">${esc(doc.active)}</span>${seg}
        <button class="iconbtn" id="t-copy" title="Copy Markdown">${COPY_ICON}</button>
        <button class="iconbtn" id="t-pdf" title="Export to PDF">${PDF_ICON}</button></div>
      <div class="docbody${pending?' pending':''}">${pending?'Generating…':md2html(content)}</div></div>`;
  pane.querySelector('#t-copy').onclick=()=>copyMD(showName);
  pane.querySelector('#t-pdf').onclick=()=>exportPDF(showName);
  pane.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{doc.offerView=b.dataset.v;render();});
}

// reset tabs at the start of a new turn (hook called by cv-chat on send)
window.JOB2COOL_NEW_TURN=function(){doc.order=[];doc.content={};doc.active=null;doc.offerView='gemma';render();};

// live document via buffer SSE -> tabs
(function(){const es=new EventSource('api/buffers/events/stream');
  es.onmessage=ev=>{try{const p=JSON.parse(ev.data);
    if(!(p&&p.type==='doc_changed'&&p.doc))return;
    const name=p.doc.name;doc.content[name]=p.doc.content||'';
    if(name==='Job Offer (MA2)'){ if(doc.active==='Job Offer')render(); return; }
    if(!(name in ORDER))return;                       // ignore unknown buffers
    if(!doc.order.includes(name)){                    // new deliverable -> tab + focus
      doc.order.push(name);doc.order.sort((a,b)=>ORDER[a]-ORDER[b]);
      doc.active=name;render();
    }else if(doc.active===name){render();}
  }catch(e){}};})();

// settings -> window.JOB2COOL_CONFIG (read by the patched cv-chat)
window.JOB2COOL_CONFIG={offer_sources:['ma2','gemma','rag']};
$('#gear').onclick=()=>{const s=window.JOB2COOL_CONFIG.offer_sources;
  $('#cfg-ma2').checked=s.includes('ma2');$('#cfg-gemma').checked=s.includes('gemma');$('#cfg-rag').checked=s.includes('rag');
  $('#modalbg').classList.add('show');};
$('#cfg-cancel').onclick=()=>$('#modalbg').classList.remove('show');
$('#modalbg').onclick=e=>{if(e.target.id==='modalbg')$('#modalbg').classList.remove('show');};
$('#cfg-save').onclick=()=>{const s=[];if($('#cfg-ma2').checked)s.push('ma2');if($('#cfg-gemma').checked)s.push('gemma');if($('#cfg-rag').checked)s.push('rag');
  if(!s.length){toast('Select at least one source');return;}window.JOB2COOL_CONFIG.offer_sources=s;$('#modalbg').classList.remove('show');toast('Settings saved');};

// open the whole Assistant chat panel from the top bar (the cv-chat floating
// launcher is hidden via CSS; we trigger it programmatically from here)
function openAssistant(){
  if(!document.body.classList.contains('cvchat-open')){const l=document.querySelector('.cvchat-launcher');if(l)l.click();}
}
$('#assistantOpen').onclick=openAssistant;

render();
</script>

<!-- citation -> PDF + bbox highlight -->
<script src="static/js2c/pdfcite.js"></script>
<!-- cv-chat Assistant (chat + STT/TTS/avatar + Thinking/Graph/Score/citations) -->
<script src="static/widget/vendor/onnxruntime-web/ort.wasm.min.js"></script>
<script src="static/widget/vendor/vad/bundle.min.js"></script>
<script src="static/widget/vendor/socket.io.min.js"></script>
<script src="static/widget/vendor/jspanel/jspanel.min.js"></script>
<script src="static/widget/vendor/marked.min.js"></script>
<script src="static/widget/vendor/highlight/highlight.min.js"></script>
<script src="static/widget/vendor/katex/katex.min.js"></script>
<script src="static/widget/vendor/katex/katex-auto-render.min.js"></script>
<script src="static/widget/cv-chat.js" defer></script>
</body>
</html>
